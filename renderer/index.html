<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'" />
    <title>Labyrinthe Pro | Premium Maze Engine</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
      .canvas-wrap {
        position: relative;
        width: 560px;
        height: 560px;
        max-width: 100%;
      }

      #maze-canvas,
      #maze-overlay {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      #maze-overlay {
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="logo">
          <i class="fas fa-microchip" style="color: var(--accent); font-size: 2rem;"></i>
          <h1>Labyrinthe<span>Pro</span></h1>
        </div>
        <div class="topbar-actions">
          <span id="whoami" class="badge"><i class="fas fa-user-circle"></i> Non connecté</span>
          <button id="logout-btn" class="secondary hidden" type="button">
            <i class="fas fa-sign-out-alt"></i> Déconnexion
          </button>
        </div>
      </header>

      <p id="status" class="status">Initialisation...</p>

      <section class="card" id="auth-section">
        <h2>Authentification</h2>
        <p class="hint">Compte admin par defaut: admin / admin123</p>
        <form id="auth-form" class="grid two-cols">
          <div class="input-group">
            <i class="fas fa-user"></i>
            <input id="username" type="text" placeholder="Nom utilisateur" required />
          </div>
          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input id="password" type="password" placeholder="Mot de passe (6+ caractères)" required />
          </div>
          <div class="actions full-row">
            <button type="button" id="register-btn" class="secondary"><i class="fas fa-user-plus"></i> Inscription</button>
            <button type="submit"><i class="fas fa-sign-in-alt"></i> Connexion</button>
          </div>
        </form>
      </section>

      <section class="card hidden" id="lab-section">
        <h2>Mes labyrinthes</h2>
        <form id="create-form" class="grid three-cols">
          <input id="lab-name" type="text" placeholder="Nom du labyrinthe" required />
          <select id="lab-size">
            <option value="petite">Petite taille</option>
            <option value="moyenne" selected>Taille moyenne</option>
            <option value="grande">Grande taille</option>
          </select>
          <input id="lab-difficulty" type="number" min="1" max="10" value="5" title="Difficulté (1-10)" />
          <button type="submit" class="full-row"><i class="fas fa-magic"></i> Créer un nouveau labyrinthe</button>
        </form>

        <div class="content-grid">
          <div>
            <h3>Liste</h3>
            <div id="lab-list" class="list"></div>
          </div>
          <div>
            <h3>Apercu</h3>
            <p id="selected-meta" class="hint">Selectionne un labyrinthe pour l'afficher.</p>

            <div class="canvas-wrap">
              <canvas id="maze-canvas" width="560" height="560"></canvas>
              <canvas id="maze-overlay" width="560" height="560"></canvas>
            </div>

            <div class="actions">
              <button id="toggle-solution" type="button" class="secondary"><i class="fas fa-eye"></i> Solution</button>
              <button id="play-btn" type="button"><i class="fas fa-play"></i> Jouer</button>
              <button id="reset-run-btn" type="button" class="secondary"><i class="fas fa-undo"></i> Reset</button>
            </div>
            <p id="game-hint" class="hint"><i class="fas fa-keyboard"></i> Utilisez les flèches ou ZQSD pour vous déplacer.</p>
          </div>
        </div>
      </section>

      <section class="card hidden" id="admin-section">
        <h2>Administration</h2>
        <div class="actions">
          <button id="load-admin" type="button">Actualiser</button>
        </div>

        <div id="admin-stats" class="stats-grid"></div>

        <h3>Utilisateurs</h3>
        <div id="admin-users" class="list"></div>

        <h3>Labyrinthes globaux</h3>
        <div id="admin-labs" class="list"></div>
      </section>
    </main>

    <script src="app.js"></script>
    <script>
      (() => {
        const baseCanvas = document.getElementById("maze-canvas");
        const overlay = document.getElementById("maze-overlay");
        const playBtn = document.getElementById("play-btn");
        const resetBtn = document.getElementById("reset-run-btn");
        const hint = document.getElementById("game-hint");

        if (!baseCanvas || !overlay || !playBtn || !resetBtn || !hint) return;

        const bctx = baseCanvas.getContext("2d", { willReadFrequently: true });
        const octx = overlay.getContext("2d");

        const state = {
          active: false,
          player: null,
          goal: null,
          step: 4,
          radius: 5,
          trail: [],
          playerSize: 11
        };

        function syncOverlaySize() {
          overlay.width = baseCanvas.width;
          overlay.height = baseCanvas.height;
        }

        function luminance(r, g, b) {
          return 0.2126 * r + 0.7152 * g + 0.0722 * b;
        }

        function getPixel(x, y) {
          const xx = Math.max(0, Math.min(baseCanvas.width - 1, Math.round(x)));
          const yy = Math.max(0, Math.min(baseCanvas.height - 1, Math.round(y)));
          const d = bctx.getImageData(xx, yy, 1, 1).data;
          return { r: d[0], g: d[1], b: d[2], a: d[3] };
        }

        function isWalkable(x, y) {
          const p = getPixel(x, y);
          if (p.a === 0) return false;
          return luminance(p.r, p.g, p.b) < 30; // Path is #020617 (lum ~6), Walls are #334155 (lum ~62)
        }

        function isWalkableDisc(x, y, r) {
          const pts = [
            [0, 0], [r, 0], [-r, 0], [0, r], [0, -r],
            [r * 0.7, r * 0.7], [r * 0.7, -r * 0.7], [-r * 0.7, r * 0.7], [-r * 0.7, -r * 0.7]
          ];
          return pts.every(([dx, dy]) => isWalkable(x + dx, y + dy));
        }

        function findWalkableNear(startX, startY, maxRadius = 160) {
          for (let rad = 0; rad <= maxRadius; rad += 2) {
            for (let a = 0; a < 360; a += 6) {
              const t = (a * Math.PI) / 180;
              const x = startX + Math.cos(t) * rad;
              const y = startY + Math.sin(t) * rad;
              if (isWalkableDisc(x, y, state.radius)) return { x, y };
            }
          }
          return null;
        }

        function drawOverlay() {
          octx.clearRect(0, 0, overlay.width, overlay.height);
          if (!state.player || !state.goal) return;

          // Draw trail with glow
          octx.shadowBlur = 10;
          octx.shadowColor = 'rgba(59, 130, 246, 0.4)';
          state.trail.forEach((pos) => {
            octx.fillStyle = 'rgba(59, 130, 246, 0.3)';
            octx.fillRect(pos.x - state.playerSize/2, pos.y - state.playerSize/2, state.playerSize, state.playerSize);
          });

          // Draw goal
          octx.shadowBlur = 20;
          octx.shadowColor = '#f43f5e';
          octx.fillStyle = "#f43f5e";
          octx.beginPath();
          octx.arc(state.goal.x, state.goal.y, 8, 0, Math.PI * 2);
          octx.fill();

          // Draw player
          octx.shadowColor = '#3b82f6';
          octx.fillStyle = "#3b82f6";
          octx.beginPath();
          octx.arc(state.player.x, state.player.y, 6, 0, Math.PI * 2);
          octx.fill();
          
          octx.strokeStyle = "#fff";
          octx.lineWidth = 2;
          octx.stroke();
          octx.shadowBlur = 0;
        }

        function setHint(text) {
          hint.textContent = text;
        }

        function initRun() {
          syncOverlaySize();

          const start = findWalkableNear(14, 14);
          const end = findWalkableNear(baseCanvas.width - 14, baseCanvas.height - 14);

          if (!start || !end) {
            state.active = false;
            state.player = null;
            state.goal = null;
            drawOverlay();
            setHint("Impossible de trouver depart/arrivee. Clique d'abord sur Voir.");
            return;
          }

          state.player = start;
          state.goal = end;
          state.active = true;
          state.trail = [];
          drawOverlay();
          setHint("Partie lancee. Deplacement: Fleches ou ZQSD.");
        }

        function resetRun() {
          const start = findWalkableNear(14, 14);
          if (!start) return;
          state.player = start;
          state.active = true;
          state.trail = [];
          drawOverlay();
          setHint("Joueur reinitialise.");
        }

        function tryMove(dx, dy) {
          if (!state.active || !state.player || !state.goal) return;

          const nx = state.player.x + dx * state.step;
          const ny = state.player.y + dy * state.step;
          if (!isWalkableDisc(nx, ny, state.radius)) return;

          // Add current position to trail
          state.trail.push({ x: state.player.x, y: state.player.y });

          state.player.x = nx;
          state.player.y = ny;
          drawOverlay();

          const dist = Math.hypot(state.player.x - state.goal.x, state.player.y - state.goal.y);
          if (dist <= 10) {
            state.active = false;
            setHint("Bravo ! Labyrinthe termine.");
            setTimeout(() => alert("Bravo ! Tu as termine le labyrinthe."), 50);
          }
        }

        function onKeyDown(e) {
          if (!state.active) return;
          const k = e.key.toLowerCase();

          if (["arrowup", "arrowdown", "arrowleft", "arrowright", "z", "q", "s", "d"].includes(k)) {
            e.preventDefault();
          }

          if (k === "arrowup" || k === "z") tryMove(0, -1);
          else if (k === "arrowdown" || k === "s") tryMove(0, 1);
          else if (k === "arrowleft" || k === "q") tryMove(-1, 0);
          else if (k === "arrowright" || k === "d") tryMove(1, 0);
        }

        playBtn.addEventListener("click", initRun);
        resetBtn.addEventListener("click", resetRun);
        window.addEventListener("keydown", onKeyDown);

        syncOverlaySize();
      })();
    </script>

    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal-box">
        <p id="modal-message"></p>
        <input id="modal-input" type="text" style="display:none; width: 100%; padding: 8px; margin: 10px 0; box-sizing: border-box;" />
        <div class="modal-actions">
          <button id="modal-cancel" type="button" class="secondary">Annuler</button>
          <button id="modal-ok" type="button">OK</button>
        </div>
      </div>
    </div>
  </body>
</html>
